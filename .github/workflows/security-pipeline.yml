name: Security Pipeline

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scanning:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json || true
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r app/requirements.txt -f json -o pip-audit-report.json || true
      - name: Upload pip-audit Report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t devsecops-app:latest .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:latest
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: '0'
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  policy-check:
    name: Policy-as-Code (OPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: Create policy input
        run: |
          cat > policy_input.json << 'EOF'
          {
            "runs_as_root": false,
            "debug_mode": false,
            "hardcoded_secrets": false,
            "base_image": "python:3.11-slim"
          }
          EOF
      - name: Run OPA policy check
        run: |
          RESULT=$(opa eval \
            --input policy_input.json \
            --data policies/dockerfile_policy.rego \
            "data.dockerfile.security.deny" \
            --format raw)
          echo "Policy violations: $RESULT"
          if [ "$RESULT" != "[]" ]; then
            echo "Policy violations found!"
            exit 1
          fi
          echo "All policies passed!"
